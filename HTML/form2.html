<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>From Day 2</h1>
    <form action="" method="post">
        <label for="uname">Username</label>
        <br>
        <input type="text" name="username" id="uname" placeholder="Balen Shah" required>
        <br><br>
        <label for="pw">Password</label>
        <br>
        <input type="password" name="password" id="pw" placeholder="********" required>
        <br><br>
        <label for="">Gender</label>
        <br>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>
        <br><br>
        <label for="skills">Skills</label>
        <br>
        <input type="checkbox" name="skills" id="python" value="python">
        <label for="python">Python</label>
        <br>
        <input type="checkbox" name="skills" id="database" value="database">
        <label for="database">Database</label>
        <br>
        <input type="checkbox" name="skills" id="CSS" value="CSS">
        <label for="CSS">CSS</label>
        <br>
        <input type="checkbox" name="skills" id="JS" value="JS">
        <label for="JS">JavaScript</label>
        <br>
        <input type="checkbox" name="skills" id="Networking" value="Networking">
        <label for="Networking">Networking</label>
        <br><br>
        <label for="">Country</label>
        <select name="Country" id="Country">
            <optgroup label="Asia">
                <option value="Nepal">Nepal</option>
                <option value="India">India</option>
                <option value="China">China</option>
                <option value="Japan">Japan</option>
                <option value="Pakistan">Pakistan</option>
            </optgroup>
            <optgroup label="Europe">
                <option value="England">England</option>
                <option value="France">France</option>
                <option value="Germany">Germany</option>
                <option value="Spain">Spain</option>
                <option value="Portugal">Portugal</option>
            </optgroup>
            <optgroup label="Africa">
                <option value="Uganda">Uganda</option>
                <option value="Nigeria">Nigeria</option>
                <option value="Ethopia">Ethopia</option>
                <option value="South Africa">South Africa</option>
                <option value="Madagascar">Madagascar</option>
            </optgroup>
        </select>
        <br><br>
        <label for="Volume">Volume</label>
        <input type="range" name="Volume" id="Volume" min="0" max="100" step="10">
        <button type="submit">Submit</button>
    
    </form>
</body>
</html>
