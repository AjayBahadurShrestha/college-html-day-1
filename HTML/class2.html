<body>

  <h2>Table in HTML</h2>

      <th>Celebrity Name</th>

      <td>Tom Cruise</td>
      <td>USA</td>
    </tr>

    <tr>
      <td>Rajesh Hamal</td>
      <td>Nepal</td>
    </tr>
    
    <tr>
      <td>Sharukh Khan</td>
      <td>India</td>
    </tr>
    
    <tr>
      <td>Amir khan</td>
      <td>India</td>
    </tr>
    
    <tr>
      <td>Salman khan</td>
      <td>India</td>
    </tr>
    
  </table>
</body>
</html>
