<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Form in HTML</h1>
  <form action="" method="">
    <label for="uname">Username</label>
     <br>
    <input type="text" name="username" id="uname" placeholder="Enter your name"> 
    <br> <br>
    <label for="pw">Password</label> 
    <br>
    <input type="password" name="password" id="pw" placeholder="******"><br> <br>

    <label for="bio">Bio</label><br>
    <textarea rows="10" cols="50" name="bio" id="bio"></textarea>
    <br> <br>

    <label for="email">Email</label>
    <br>
    <input type="email" name="email" id="email" placeholder="abc@gmail.com" required>
    <br><br>

    <label for="age">Age</label>
    <br>
    <input type="number" name="age" id="age" placeholder="16" required>
    <br><br>

    <label for="dob">Date of Birth AD</label>
    <br>
    <input type="date" name="dob" id="dob"  required>
    

    <input type="month" name="" id="">
    <input type="week" name="" id="">
    <br><br>

    <label for="color">Select Color</label> <br>
    <input type="color" id="color" name="color"> <br> <br>
    <button type="submit">Submit</button>
    <!-- <input type="button" value="Submit using Input"> -->
    
  </form>


  <!-- 
  Form - Usecase - Registration, Collect User Input, Login, Online
   Shopping, 

   input- collects iput from user.
      id - unique idebtifier, name-name of input field, 
      placeholder-suggestion text
      text - for text input [short like username, contact]
      password- for password input.
      date- provides date-month-year.
      datetime-local-pprovides date and time.
      number- for number input.
      week- provides month and year.
      color- provides color picker.


   label- provides label for input field.
      for -{Should be same as id of input field}- connects label to input failed.

   textarea - for large input like bio, comment, feedback.
   button- for submit, reset, cancel.
  
  
  
  -->
  
</body>
</html>
