<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment Display</title>
  <style>
    .container {
      background-color: green;
      padding: 20px;
      width: 500px;   /* enough space for 4 boxes */
    }

    .box {
      display: inline-block;
      height: 100px;
      width: 100px;
      border: 2px solid black;
      background-color: red;
      margin: 10px;
      text-align: center;
      line-height: 100px; /* centers text vertically */
      color: white;
      font-weight: bold;
    }

    .box1 { opacity: 0; border-radius: 0%; }
    .box2 { opacity: 0.25; border-radius: 15%; }
    .box3 { opacity: 0.5; border-radius: 25%; }
    .box4 { opacity: 0.75; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="container">
    <h3>Inline-block Boxes</h3>
    <span class="box box1">Box1</span>
    <span class="box box2">Box2</span>
    <span class="box box3">Box3</span>
    <span class="box box4">Box4</span>
  </div>
</body>
</html>
