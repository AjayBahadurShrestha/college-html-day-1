<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .outer{
      width: 400px;
      height: 400px;
      border: 1px solid black;
    }

    .inner{
      width: 50%;
      height: 50%;
      border: 1px dotted black;
    }
  </style>
</head>
<body>
  <h1>Height, Width and Border</h1>
  <div class="outer">
    <p>Outer Box</p>
    <div class="inner">
      <p>Inner Box</p>

    </div>
  </div>
  
</body>
</html>
