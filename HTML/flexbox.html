<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Demo</title>
  <link rel="stylesheet" href="../CSS/flexbox.css">
</head>
<body>
 <h1>Flexbox</h1> 

 <!-- Flexbox - used to align items in one dimension (row or column).
      It requires one container and items inside it.
      It helps to align items horizontally, vertically,
      change the direction of flex, shrink the item,
      grow the item, arrange the order, etc. -->

 <!-- Flex Direction Examples -->
 <h3>Flex Direction</h3>
 <p>Row</p>
 <div class="container" style="flex-direction: row;">
   <div class="item">1</div>
   <div class="item">2</div>
   <div class="item">3</div>
   <div class="item">4</div>
   <div class="item">5</div>
   <div class="item">6</div>
 </div>
 <hr>

 <p>Row-Reverse</p>
 <div class="container" style="flex-direction: row-reverse;">
   <div class="item">1</div>
   <div class="item">2</div>
   <div class="item">3</div>
   <div class="item">4</div>
   <div class="item">5</div>
   <div class="item">6</div>
 </div>
 <hr>

 <p>Column</p>
 <div class="container" style="flex-direction: column;">
   <div class="item">1</div>
   <div class="item">2</div>
   <div class="item">3</div>
   <div class="item">4</div>
   <div class="item">5</div>
   <div class="item">6</div>
 </div>
 <hr>

 <p>Column-Reverse</p>
 <div class="container" style="flex-direction: column-reverse;">
   <div class="item">1</div>
   <div class="item">2</div>
   <div class="item">3</div>
   <div class="item">4</div>
   <div class="item">5</div>
   <div class="item">6</div>
 </div>
 <hr>

 <!-- Justify Content Example -->
 <h3>Justify Content</h3>
 <!-- justify-content arranges the items along the main axis.
      syntax:
      justify-content: flex-start | flex-end | center | space-evenly | space-around | space-between -->
 <p>End</p>
 <div class="container" style="background-color: lightgreen; justify-content: space-between;">
   <div class="item">1</div>
   <div class="item">2</div>
   <div class="item">3</div>
   <div class="item">4</div>
   <div class="item">5</div>
   <div class="item">6</div>
 </div>

 <h3>Align Item</h3>
 <!-- Allign item arrange the items in cross-axis -->
 <div class="container" style="background-color: tomato; justify-content: space-evenly; align-items: end;">
  <item>1</item>
  <item>2</item>
  <item>3</item>
  <item>4</item>
  <item>5</item>
  <item>6</item>
 </div>
</body>
</html>
